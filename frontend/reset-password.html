<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – Worldocs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .step-indicator {
      display: flex;
      align-items: center;
      margin-bottom: 28px;
      gap: 0;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-soft);
    }
    .step .num {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
      transition: all 0.3s;
    }
    .step.active .num   { background: var(--primary); color: #fff; }
    .step.done .num     { background: var(--success);  color: #fff; }
    .step.active        { color: var(--primary-dark); }
    .step-line {
      flex: 1;
      height: 2px;
      background: var(--border);
      margin: 0 8px;
    }
    .pw-toggle { position: relative; }
    .pw-toggle input { padding-right: 44px; }
    .pw-eye {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      cursor: pointer; font-size: 1.1rem;
      color: var(--text-muted); transition: color 0.2s;
      user-select: none;
    }
    .pw-eye:hover { color: var(--primary); }
    .resend-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
    }
    .resend-btn {
      background: none;
      border: 1.5px solid var(--primary);
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      width: auto;
      min-width: unset;
    }
    .resend-btn:hover:not(:disabled) {
      background: var(--primary);
      color: #fff;
    }
    .resend-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .resend-timer {
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    #resend-msg {
      font-size: 0.82rem;
      margin-top: 4px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <!-- Step 1: Request reset -->
  <div class="container" style="max-width:420px;" id="request-container">
    <div style="text-align:center; margin-bottom:20px;">
      <span style="font-size:2.8rem;">🔐</span>
    </div>
    <h1 style="text-align:center; margin-bottom:6px;">Forgot Password?</h1>
    <p class="subtitle" style="text-align:center;">Enter your email and we'll send a 6-digit OTP.</p>

    <!-- Step indicator -->
    <div class="step-indicator">
      <div class="step active" id="si-1"><div class="num">1</div> Request</div>
      <div class="step-line"></div>
      <div class="step" id="si-2"><div class="num">2</div> Reset</div>
    </div>

    <div class="form-group">
      <label>✉️ Email Address</label>
      <input type="email" id="req-email" placeholder="Enter your account email" autocomplete="email">
    </div>

    <button onclick="requestReset()" id="req-btn">&#128233; Send OTP</button>
    <div id="req-error" class="error"></div>
    <div id="req-success" class="success"></div>

    <button id="proceed-btn" onclick="goToResetForm()"
      style="display:none; margin-top:2px; background:linear-gradient(135deg,#10b981,#059669);">
      &#128274; Enter OTP &rarr;
    </button>

    <a href="login.html" class="back-link">&larr; Back to Login</a>
  </div>

  <!-- Step 2: New password -->
  <div class="container" style="max-width:420px; display:none;" id="reset-container">
    <div style="text-align:center; margin-bottom:20px;">
      <span style="font-size:2.8rem;">🔑</span>
    </div>
    <h1 style="text-align:center; margin-bottom:6px;">Create New Password</h1>
    <p class="subtitle" style="text-align:center;">Almost there! Enter your new secure password.</p>

    <!-- Step indicator -->
    <div class="step-indicator">
      <div class="step done" id="si2-1"><div class="num">✓</div> Request</div>
      <div class="step-line" style="background:var(--primary);"></div>
      <div class="step active" id="si2-2"><div class="num">2</div> Reset</div>
    </div>

    <div class="form-group">
      <label>✉️ Email Address</label>
      <input type="email" id="reset-email" placeholder="Confirm your email">
    </div>
    <div class="form-group">
      <label>&#128274; Enter OTP</label>
      <input type="text" id="reset-token" placeholder="Enter 6-digit OTP from email"
        maxlength="6" inputmode="numeric" pattern="[0-9]{6}"
        style="font-size:1.6rem; letter-spacing:10px; text-align:center; font-family:monospace; font-weight:700;">
      <div class="resend-row">
        <button class="resend-btn" id="resend-btn" onclick="resendOtp()" disabled>🔁 Resend OTP</button>
        <span class="resend-timer" id="resend-timer">Resend in <strong id="resend-countdown">30</strong>s</span>
      </div>
      <div id="resend-msg"></div>
    </div>
    <div class="form-group">
      <label>🔒 New Password</label>
      <div class="pw-toggle">
        <input type="password" id="reset-password" placeholder="Enter new password">
        <span class="pw-eye" onclick="togglePw('reset-password', this)">👁</span>
      </div>
    </div>

    <button onclick="submitReset()" id="reset-btn">🔓 Update Password</button>
    <div id="reset-error" class="error"></div>
    <div id="reset-success" class="success"></div>

    <a href="login.html" class="back-link">← Back to Login</a>
  </div>

  <script>
    // Works when served via HTTP server AND when opened directly as a file
    const API = (window.location.origin && window.location.origin !== 'null')
      ? window.location.origin
      : 'http://127.0.0.1:8000';
    function togglePw(id, icon) {
      const inp = document.getElementById(id);
      inp.type = (inp.type === 'password') ? 'text' : 'password';
      icon.textContent = (inp.type === 'text') ? '🙈' : '👁';
    }

    async function requestReset() {
      const email   = document.getElementById('req-email').value.trim();
      const errDiv  = document.getElementById('req-error');
      const sucDiv  = document.getElementById('req-success');
      const btn     = document.getElementById('req-btn');

      errDiv.style.display = sucDiv.style.display = 'none';
      if (!email) {
        errDiv.textContent = 'Please enter your email.';
        errDiv.style.display = 'block'; return;
      }
      btn.textContent = '⏳ Sending…'; btn.disabled = true;
      try {
        const res = await fetch(`${API}/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        sucDiv.textContent = '✅ ' + data.message;
        sucDiv.style.display = 'block';
        btn.textContent = '📩 Sent!';

        // Pre-fill step 2 email and show the proceed button
        document.getElementById('reset-email').value = email;
        document.getElementById('proceed-btn').style.display = 'block';
      } catch (err) {
        errDiv.textContent = '❌ Failed to connect to the server.';
        errDiv.style.display = 'block';
        btn.textContent = '📩 Send OTP'; btn.disabled = false;
      }
    }

    function goToResetForm() {
      document.getElementById('request-container').style.display = 'none';
      document.getElementById('reset-container').style.display = 'block';
      startResendCooldown();
    }

    let _resendTimer = null;
    function startResendCooldown(seconds = 30) {
      const btn = document.getElementById('resend-btn');
      const timerEl = document.getElementById('resend-timer');
      const countEl = document.getElementById('resend-countdown');
      btn.disabled = true;
      timerEl.style.display = 'inline';
      let remaining = seconds;
      countEl.textContent = remaining;
      clearInterval(_resendTimer);
      _resendTimer = setInterval(() => {
        remaining--;
        countEl.textContent = remaining;
        if (remaining <= 0) {
          clearInterval(_resendTimer);
          btn.disabled = false;
          timerEl.style.display = 'none';
        }
      }, 1000);
    }

    async function resendOtp() {
      const email = document.getElementById('reset-email').value.trim();
      const msgEl = document.getElementById('resend-msg');
      const btn   = document.getElementById('resend-btn');
      if (!email) {
        msgEl.style.color = 'var(--danger, #ef4444)';
        msgEl.textContent = '❌ Email not found. Go back and re-enter it.';
        return;
      }
      btn.disabled = true;
      msgEl.style.color = 'var(--text-muted)';
      msgEl.textContent = '⏳ Resending…';
      try {
        const res = await fetch(`${API}/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        await res.json();
        msgEl.style.color = '#10b981';
        msgEl.textContent = '✅ A new OTP has been sent!';
      } catch (err) {
        msgEl.style.color = 'var(--danger, #ef4444)';
        msgEl.textContent = '❌ Failed to resend. Check your connection.';
      }
      startResendCooldown(30);
      setTimeout(() => { msgEl.textContent = ''; }, 5000);
    }

    async function submitReset() {
      const email = document.getElementById('reset-email').value.trim();
      const token = document.getElementById('reset-token').value.trim();
      const pass  = document.getElementById('reset-password').value;
      const errDiv = document.getElementById('reset-error');
      const sucDiv = document.getElementById('reset-success');
      const btn    = document.getElementById('reset-btn');

      errDiv.style.display = sucDiv.style.display = 'none';
      if (!email || !token || !pass) {
        errDiv.textContent = 'Please fill in all fields.';
        errDiv.style.display = 'block'; return;
      }
      btn.textContent = '⏳ Updating…'; btn.disabled = true;
      try {
        const res = await fetch(`${API}/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, reset_token: token, new_password: pass })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Reset failed');
        sucDiv.textContent = '🎉 ' + data.message + ' Redirecting…';
        sucDiv.style.display = 'block';
        btn.textContent = '✅ Password Updated!';
        setTimeout(() => window.location.href = 'login.html', 2000);
      } catch (err) {
        errDiv.textContent = '❌ ' + err.message;
        errDiv.style.display = 'block';
        btn.textContent = '🔓 Update Password'; btn.disabled = false;
      }
    }
  </script>
</body>
</html>
